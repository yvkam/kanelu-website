version: '3'
services:
  nginx:
    image: nginx:latest
    container_name: production_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/error.log:/etc/nginx/error_log.log
      - ./nginx/cache/:/etc/nginx/cache
      - /etc/letsencrypt/:/etc/letsencrypt/
    ports:
      - 80:80
      - 443:443

  maniema-admin:
    image: yvkam/maniema-admin
    container_name: maniema-admin
    expose:
      - "80"

  cadastre:
    image: yvkam/cadastre
    container_name: cadastre
    expose:
      - "8080"
